<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>芸芸 ❤️</title>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>

<style>
:root {
  --primary: #ff4f9b;
  --primary-hover: #ff2a82;
  --bg-gradient: linear-gradient(135deg, #ffeef7 0%, #ffb6d9 50%, #ffd3ea 100%);
  --card-bg: rgba(255, 255, 255, 0.88);
  --shadow: 0 20px 50px rgba(255, 79, 155, 0.15);
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Microsoft JhengHei", sans-serif;
}

body {
  height: 100vh;
  width: 100vw;
  overflow: hidden;
  background: var(--bg-gradient);
  display: flex;
  justify-content: center;
  align-items: center;
  perspective: 1000px;
}

/* CONTAINER & PAGE ANIMATIONS */
.container {
  position: relative;
  width: min(500px, 92vw);
  min-height: 420px;
  display: flex;
  justify-content: center;
  align-items: center;
}

.page {
  position: absolute;
  width: 100%;
  background: var(--card-bg);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  padding: 40px 30px;
  border-radius: 30px;
  text-align: center;
  box-shadow: var(--shadow);
  border: 1px solid rgba(255, 255, 255, 0.6);
  
  opacity: 0;
  visibility: hidden;
  transform: translateY(30px) scale(0.95) rotateX(10deg);
  transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
  pointer-events: none;
}

.page.active {
  opacity: 1;
  visibility: visible;
  transform: translateY(0) scale(1) rotateX(0deg);
  pointer-events: auto;
  z-index: 10;
}

/* TYPOGRAPHY */
h1 {
  color: var(--primary);
  font-size: 2rem;
  margin-bottom: 20px;
  font-weight: 800;
  letter-spacing: -0.5px;
}

p.desc {
  font-size: 1.1rem;
  color: #605359;
  line-height: 1.6;
  min-height: 54px;
}

/* BEAUTIFIED DATE/TIME & SELECT ELEMENTS */
.datetime-wrapper {
  background: rgba(255, 255, 255, 0.5);
  border-radius: 20px;
  padding: 15px;
  margin: 15px 0;
  border: 1px solid rgba(255, 79, 155, 0.15);
  display: flex;
  flex-direction: column;
  box-sizing: border-box;
  width: 100%;
}

input[type="date"], input[type="text"], select {
  width: 100%;
  padding: 14px 18px;
  margin: 8px 0;
  border: 2px solid #fff0f6;
  border-radius: 16px;
  font-size: 16px;
  line-height: 1.2;
  height: 52px; 
  color: #4a3e43;
  background: rgba(255, 255, 255, 0.8);
  outline: none;
  transition: all 0.3s ease;
  box-sizing: border-box;
  max-width: 100%;
}

select {
  cursor: pointer;
  -webkit-appearance: none;
  appearance: none;
}

/* CUSTOM INPUT FOR OTHER OPTION */
.custom-input {
  display: none;
  animation: fadeIn 0.4s ease forwards;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(-10px); }
  to { opacity: 1; transform: translateY(0); }
}

/* IOS SAFARI DATE PLACEHOLDER FIX */
input[type="date"]::before {
  content: "請選擇出差日期 📅";
  width: 100%;
  color: #a3979d;
}

input[type="date"]:focus::before,
input[type="date"]:valid::before {
  display: none !important;
  content: "" !important;
}

input[type="date"]::-webkit-calendar-picker-indicator {
  background-color: transparent;
  cursor: pointer;
  filter: invert(47%) sepia(85%) saturate(1912%) hue-rotate(309deg) brightness(101%) contrast(101%);
}

input:focus, select:focus {
  border-color: var(--primary);
  background: #fff;
  box-shadow: 0 0 0 4px rgba(255, 79, 155, 0.15);
}

/* BUTTONS CRADLE */
.btn-group {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 20px;
  margin-top: 20px;
  min-height: 50px;
  width: 100%;
  max-width: 320px;
  margin-left: auto;
  margin-right: auto;
}

/* FIXED EQUAL WIDTH AND CENTERING RULE ENGINE */
button, #noBtn {
  display: inline-flex !important;
  align-items: center !important;
  justify-content: center !important;
  box-sizing: border-box !important;
  height: 50px !important;
  width: 140px !important; /* Forces uniform explicit desktop sizing */
  padding: 0 !important;
  border-radius: 20px !important;
  font-size: 16px !important;
  font-weight: 700 !important;
  text-align: center !important;
  cursor: pointer;
  transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
}

button {
  border: 2px solid transparent !important;
}

.primary {
  background: var(--primary);
  color: white;
  box-shadow: 0 8px 20px rgba(255, 79, 155, 0.3);
}

.primary:hover {
  background: var(--primary-hover);
  transform: translateY(-2px);
  box-shadow: 0 12px 24px rgba(255, 79, 155, 0.4);
}

/* DYNAMIC RUNAWAY BUTTON */
#noBtn {
  position: fixed;
  z-index: 9999;
  background: white;
  color: var(--primary);
  border: 2px solid var(--primary) !important;
  box-shadow: 0 8px 20px rgba(0, 0, 0, 0.05);
  will-change: left, top;
}

/* RESPONSIVE LAYOUT CLEANUP FOR PHONE SCREENS */
@media (max-width: 768px) {
  .btn-group {
    max-width: 100%;
  }
  #yesBtn, #noBtn {
    flex: 1 !important; /* Tells them to grow equally and occupy identical splits of the container */
    width: auto !important;
  }
  #noBtn {
    position: static !important; /* Pushes into flex flow seamlessly */
    box-shadow: none;
  }
  #noPlaceholder {
    display: none !important;
  }
}

/* FLOATING HEARTS COUTURE */
.heart {
  position: fixed;
  pointer-events: none;
  z-index: 99;
  font-size: 24px;
  will-change: transform;
  animation: floatUp 4.5s cubic-bezier(0.1, 0.8, 0.3, 1) forwards;
}

@keyframes floatUp {
  0% { transform: translateY(105vh) scale(0.3) rotate(0deg); opacity: 0; }
  15% { opacity: 0.9; }
  100% { transform: translateY(-15vh) scale(1.2) rotate(360deg); opacity: 0; }
}

/* NO CROPPING IMAGE FIX */
.final-img {
  width: 100%;
  max-height: 300px; 
  object-fit: contain; 
  border-radius: 20px;
  margin-top: 15px;
  background: transparent;
}

#summary {
  background: rgba(255, 79, 155, 0.04);
  border: 1px dashed rgba(255, 79, 155, 0.25);
  border-radius: 20px;
  padding: 18px;
  text-align: left;
  margin: 15px 0;
}

#summary p {
  margin: 6px 0;
  font-size: 1rem;
  color: #504248;
}
</style>
</head>
<body>

<audio id="bgm" loop><source src="music.mp3"></audio>

<div class="container">
  <div class="page active" id="p1">
    <h1>芸芸 🫶</h1>
    <p class="desc" id="typing"></p>
    <div class="btn-group">
      <button class="primary" id="yesBtn" onclick="start()">願意 ❤️</button>
      <div style="width: 140px;" id="noPlaceholder"></div> 
    </div>
  </div>

  <div class="page" id="p2">
    <h1>🫣 什麽？！</h1>
    <p class="desc">哇哇哇 芸芸答應我了 好害羞 😳</p>
    <button class="primary" onclick="show(3)">下一步 🥰</button>
  </div>

  <div class="page" id="p3">
    <h1>📅 芸芸幾時得空呢？</h1>
    <div class="datetime-wrapper">
      <input type="date" id="date" required>
      <select id="time">
        <option value="">請選擇出發時間...</option>
      </select>
    </div>
    <button class="primary" onclick="validateStep3()">下一步 🥰</button>
  </div>

  <div class="page" id="p4">
    <h1>🍜 芸芸想吃什麼呢？</h1>
    <select id="food" onchange="toggleCustomInput('food', 'customFood')">
      <option value="">請選擇專屬美食...</option>
      <option value="🍣 OMAKASE 哈哈哈">OMAKASE 哈哈哈 🍣</option>
      <option value="🍔 麥當當">麥當當 🍔</option>
      <option value="🍲 海底撈">海底撈 🍲</option>
      <option value="🥗 c:ontent grain bowl">c:ontent grain bowl 🥗</option>
      <option value="🍨 本宮的茶">本宮的茶 🍨</option>
      <option value="OTHER">其它... 📝</option>
    </select>
    <input type="text" id="customFood" class="custom-input" placeholder="想吃什麼呢？ 😋">
    <button class="primary" onclick="validateStep4()">下一步 🥰</button>
  </div>

  <div class="page" id="p5">
    <h1>🥰 芸芸飯後想去哪呢？</h1>
    <select id="act" onchange="toggleCustomInput('act', 'customAct')">
      <option value="">請選擇浪漫行程...</option>
      <option value="🎬 浪漫看電影">浪漫看電影 🎬</option>
      <option value="🌳 牽著手悠閒地散散步">牽手散散步 🌳</option>
      <option value="🏎️ 刺激卡丁車">刺激卡丁車 🏎️</option>
      <option value="⛳ 打高爾夫球">打高爾夫球 ⛳</option>
      <option value="🎡 去遊樂園玩">去遊樂園玩 🎡</option>
      <option value="OTHER">其它... 📝</option>
    </select>
    <input type="text" id="customAct" class="custom-input" placeholder="想去哪裡玩？ 🚀">
    <button class="primary" onclick="finish()">完成 🥰</button>
  </div>

  <div class="page" id="p6">
    <h1>預約成功 ❤️ 要去載芸芸了</h1>
    <div id="summary"></div>
    <img src="photo.jpeg" class="final-img" alt="我們的相片">
  </div>
</div>

<button id="noBtn">不願意 🙈</button>

<script>
let accepted = false;

/* GENERATE 30-MINUTE INTERVALS DYNAMICALLY */
function populateTimeDropdown() {
  const timeSelect = document.getElementById("time");
  for (let hour = 0; hour < 24; hour++) {
    for (let min of ["00", "30"]) {
      let formattedHour = hour.toString().padStart(2, '0');
      let timeValue = `${formattedHour}:${min}`;
      let opt = document.createElement("option");
      opt.value = timeValue;
      opt.textContent = timeValue;
      timeSelect.appendChild(opt);
    }
  }
}
window.addEventListener('DOMContentLoaded', populateTimeDropdown);

/* TYPING EFFECT */
const text = "願不願意和我一起出去玩嘿嘿 😈";
let charIndex = 0;
function type() {
  if (charIndex < text.length) {
    document.getElementById("typing").innerHTML += text[charIndex++];
    setTimeout(type, 70);
  }
}
window.addEventListener('DOMContentLoaded', type);

/* NAVIGATION CONTROL */
function show(n) {
  document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
  document.getElementById("p" + n).classList.add("active");
}

/* TOGGLE CUSTOM TEXT INPUT FOR 'OTHER' OPTION */
function toggleCustomInput(selectId, inputId) {
  const selectEl = document.getElementById(selectId);
  const inputEl = document.getElementById(inputId);
  if (selectEl.value === "OTHER") {
    inputEl.style.display = "block";
    inputEl.focus();
  } else {
    inputEl.style.display = "none";
  }
}

/* SMART TIMETRAVEL VALIDATION ENGINE */
function validateStep3() {
  const dateVal = document.getElementById("date").value;
  const timeVal = document.getElementById("time").value;

  if (!dateVal || !timeVal) {
    return alert("請先填寫日期與時間唷 📅");
  }

  const selectedDateTime = new Date(`${dateVal}T${timeVal}`);
  const currentDateTime = new Date();

  if (selectedDateTime < currentDateTime) {
    return alert("我們是要搭時光機嗎嘿嘿 ✈️");
  }

  show(4);
}

function validateStep4() {
  const foodSelect = document.getElementById("food").value;
  const customFood = document.getElementById("customFood").value.trim();
  
  if (!foodSelect) return alert("選一個妳想品嚐的美食吧 🍜");
  if (foodSelect === "OTHER" && !customFood) return alert("既然選了其它，就寫下妳想吃的嘛 ✍️");
  
  show(5);
}

/* START PROCESS (YES CLICKED) */
function start() {
  accepted = true;
  const noBtn = document.getElementById("noBtn");
  if(noBtn) noBtn.remove();

  document.getElementById("bgm").play().catch(() => {});

  for (let i = 0; i < 45; i++) {
    setTimeout(() => {
      let h = document.createElement("div");
      h.className = "heart";
      h.innerHTML = ["❤️", "💖", "💝", "💕"][Math.floor(Math.random() * 4)];
      h.style.left = Math.random() * 100 + "vw";
      h.style.fontSize = (Math.random() * 16 + 16) + "px";
      document.body.appendChild(h);
      setTimeout(() => h.remove(), 4500);
    }, i * 40);
  }

  confetti({ particleCount: 160, spread: 80, origin: { y: 0.6 } });
  show(2);
}

/* FINISH APPLICATION & SUBMIT TO GOOGLE FORM */
function finish() {
  const dateVal = document.getElementById("date").value;
  const timeVal = document.getElementById("time").value;
  
  const foodSelect = document.getElementById("food").value;
  const foodVal = foodSelect === "OTHER" ? `✍️ ${document.getElementById("customFood").value.trim()}` : foodSelect;
  
  const actSelect = document.getElementById("act").value;
  if (!actSelect) return alert("挑選一個活動吧 🥰");
  if (actSelect === "OTHER" && !document.getElementById("customAct").value.trim()) return alert("別忘了填寫想去哪唷 ✍️");
  const actVal = actSelect === "OTHER" ? `✍️ ${document.getElementById("customAct").value.trim()}` : actSelect;

  // 1. Update the UI text immediately
  document.getElementById("summary").innerHTML = `
    <p><strong>📅 日期：</strong> ${dateVal}</p>
    <p><strong>⏰ 時間：</strong> ${timeVal}</p>
    <p><strong>🍜 餐廳：</strong> ${foodVal}</p>
    <p><strong>✨ 活動：</strong> ${actVal}</p>
  `;

  // 2. Switch to the final confirmation page and trigger confetti
  show(6);

  let end = Date.now() + (3 * 1000);
  (function frame() {
    confetti({ particleCount: 3, angle: 60, spread: 55, origin: { x: 0 } });
    confetti({ particleCount: 3, angle: 120, spread: 55, origin: { x: 1 } });
    if (Date.now() < end) requestAnimationFrame(frame);
  }());

  // 3. Prepare data payload for Google Form
  const formURL = "https://docs.google.com/forms/d/e/1FAIpQLSfj-bSuTkmDa01o2OSRAY2LAhmvKPZGdkYXDEBaDSO2xtI1qw/formResponse";
  
  const formData = new FormData();
  formData.append("entry.234822483", dateVal); // Replace with your Date Entry ID
  formData.append("entry.230173302", timeVal); // Replace with your Time Entry ID
  formData.append("entry.1175596544", foodVal); // Replace with your Food Entry ID
  formData.append("entry.1429888953", actVal);  // Replace with your Activity Entry ID

  // 4. Send data silently to Google Forms in the background
  fetch(formURL, {
    method: "POST",
    mode: "no-cors", // Crucial: Prevents CORS errors from blocking execution
    body: formData
  })
  .then(() => {
    console.log("Data successfully sent to Google Form!");
  })
  .catch((error) => {
    console.error("Error sending data:", error);
  });
}

/* ========================================================
  ⚡ PERFECTED LONG-DISTANCE FAST PHYSICS ENGINE
======================================================== */
const btn = document.getElementById("noBtn");
const yesBtn = document.getElementById("yesBtn");
const btnGroup = document.querySelector(".btn-group");

let btnX = 0, btnY = 0;         
let velX = 0, velY = 0;         
let mouseX = -9999, mouseY = -9999; 
let isInitialized = false;

document.addEventListener("mousemove", (e) => {
  mouseX = e.clientX;
  mouseY = e.clientY;
});

let homeX = 0, homeY = 0;

function updateHomePosition() {
  const yesRect = yesBtn.getBoundingClientRect();
  homeX = yesRect.right + 20; 
  homeY = yesRect.top;
}

function handleMobileDomMigration() {
  if (window.innerWidth <= 768) {
    if (btn.parentNode !== btnGroup) {
      btnGroup.appendChild(btn);
    }
  } else {
    if (btn.parentNode !== document.body) {
      document.body.appendChild(btn);
      isInitialized = false;
    }
  }
}

function updatePhysics() {
  if (accepted) return;

  handleMobileDomMigration();

  if (window.innerWidth <= 768) {
    const p1 = document.getElementById("p1");
    btn.style.display = (!p1.classList.contains("active")) ? "none" : "inline-flex";
    requestAnimationFrame(updatePhysics);
    return;
  }

  updateHomePosition();

  if (!isInitialized) {
    if(yesBtn.getBoundingClientRect().width > 0) {
      btnX = homeX;
      btnY = homeY;
      isInitialized = true;
    }
    requestAnimationFrame(updatePhysics);
    return;
  }

  const rect = btn.getBoundingClientRect();
  const centerX = btnX + rect.width / 2;
  const centerY = btnY + rect.height / 2;

  let diffX = centerX - mouseX;
  let diffY = centerY - mouseY;
  let mouseToBtnDist = Math.sqrt(diffX * diffX + diffY * diffY);

  let mouseToHomeX = (homeX + rect.width / 2) - mouseX;
  let mouseToHomeY = (homeY + rect.height / 2) - mouseY;
  let mouseToHomeDist = Math.sqrt(mouseToHomeX * mouseToHomeX + mouseToHomeY * mouseToHomeY);

  const dangerZone = 180; 

  let targetX = homeX;
  let targetY = homeY;

  if (mouseToHomeDist < dangerZone || mouseToBtnDist < 140) {
    if (mouseToBtnDist > 0) {
      let pushForce = (dangerZone - mouseToBtnDist) * 5.5; 
      targetX = btnX + (diffX / mouseToBtnDist) * pushForce;
      targetY = btnY + (diffY / mouseToBtnDist) * pushForce;
    }
  }

  let springK = 0.45;  
  let damperC = 0.52;  

  let forceX = (targetX - btnX) * springK;
  let forceY = (targetY - btnY) * springK;

  velX = (velX + forceX) * damperC;
  velY = (velY + forceY) * damperC;

  btnX += velX;
  btnY += velY;

  const pad = 25;
  if (btnX < pad) { btnX = pad; velX = 0; }
  if (btnX > window.innerWidth - rect.width - pad) { btnX = window.innerWidth - rect.width - pad; velX = 0; }
  if (btnY < pad) { btnY = pad; velY = 0; }
  if (btnY > window.innerHeight - rect.height - pad) { btnY = window.innerHeight - rect.height - pad; velY = 0; }

  btn.style.left = btnX + "px";
  btn.style.top = btnY + "px";

  const p1 = document.getElementById("p1");
  if (!p1.classList.contains("active")) {
    btn.style.display = "none";
  } else {
    btn.style.display = "block";
  }

  requestAnimationFrame(updatePhysics);
}

requestAnimationFrame(updatePhysics);
window.addEventListener("resize", () => { updateHomePosition(); });


/* MULTIPLE CUTE POPUPS ENGINE */
const noAlerts = [
  "誒？不准點這個啦 😤",
  "再給你一次機會，重新選一遍 🥺",
  "我的字典裡沒有不願意這個選項喔 📖",
  "好啦別鬧了，快點隔壁的『願意』嘛～ 👉👈",
  "哼，不管你點幾次，你注定是要跟我出去玩的了 🤪❤️"
];
let alertIndex = 0;

btn.addEventListener("click", () => {
  alert(noAlerts[alertIndex]);
  alertIndex = (alertIndex + 1) % noAlerts.length;
});
</script>

</body>
</html>
