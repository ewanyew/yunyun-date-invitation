<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>給芸芸 ❤️</title>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:"Microsoft JhengHei",sans-serif;
}

body{
  height:100vh;
  overflow:hidden;
  background:linear-gradient(135deg,#ff8dc7,#ffb6d9,#ffd4e8);
  display:flex;
  justify-content:center;
  align-items:center;
}

/* CARD */
.card{
  background:rgba(255,255,255,0.92);
  backdrop-filter:blur(12px);
  padding:40px;
  border-radius:28px;
  width:min(600px,92vw);
  text-align:center;
  box-shadow:0 20px 50px rgba(0,0,0,0.18);
  position:relative;
}

h1{
  color:#ff4f9b;
}

.typing{
  min-height:50px;
  font-size:18px;
  margin-bottom:10px;
}

/* YES BUTTON */
.yes{
  background:#ff4f9b;
  color:white;
  border:none;
  padding:14px 26px;
  border-radius:999px;
  font-size:18px;
  cursor:pointer;
  margin-top:10px;
}

/* NO BUTTON (FREE ROAM MEME STYLE) */
.no{
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  background:white;
  color:#ff4f9b;
  border:2px solid #ff4f9b;
  padding:12px 20px;
  border-radius:999px;
  cursor:pointer;
  transition:0.05s;
  z-index:999;
}

/* HEARTS */
.heart{
  position:fixed;
  pointer-events:none;
  animation:float 5s linear forwards;
}

@keyframes float{
  from{transform:translateY(100vh);opacity:1;}
  to{transform:translateY(-120px);opacity:0;}
}
</style>
</head>

<body>

<audio id="bgm" loop>
<source src="music.mp3">
</audio>

<div class="card">

<h1>芸芸 ❤️</h1>

<div class="typing" id="typing"></div>

<button class="yes" onclick="startLove()">願意 ❤️</button>

</div>

<button class="no" id="noBtn">不願意 🙈</button>

<script>

let noBtn = document.getElementById("noBtn");

let tease = 0;

/* TYPEWRITER */
let text = "我想跟你去一個很普通，但很重要的約會 ❤️";
let i = 0;

function type(){
  if(i < text.length){
    document.getElementById("typing").innerHTML += text[i++];
    setTimeout(type,60);
  }
}
type();

/* HEARTS */
function startLove(){

  document.getElementById("bgm").play().catch(()=>{});

  for(let i=0;i<80;i++){
    setTimeout(()=>{
      let h=document.createElement("div");
      h.className="heart";
      h.innerHTML=["❤️","💖","💕"][Math.floor(Math.random()*3)];
      h.style.left=Math.random()*100+"vw";
      h.style.fontSize=(18+Math.random()*25)+"px";
      document.body.appendChild(h);
      setTimeout(()=>h.remove(),5000);
    },i*20);
  }

}

/* MOBILE */
const isTouch =
  "ontouchstart" in window ||
  navigator.maxTouchPoints > 0;

if(isTouch){

  noBtn.addEventListener("click",()=>{
    alert("你明明就願意 ❤️");
  });

}

/* AI MEME ESCAPE */
else{

let mouseX = 0, mouseY = 0;
let lastX = 0, lastY = 0;
let velX = 0, velY = 0;

document.addEventListener("mousemove",(e)=>{

  mouseX = e.clientX;
  mouseY = e.clientY;

  velX = mouseX - lastX;
  velY = mouseY - lastY;

  lastX = mouseX;
  lastY = mouseY;

});

setInterval(()=>{

  const rect = noBtn.getBoundingClientRect();

  const cx = rect.left + rect.width/2;
  const cy = rect.top + rect.height/2;

  const dist = Math.hypot(mouseX - cx, mouseY - cy);

  if(dist < 180){

    /* predict cursor future position */
    const futureX = mouseX + velX * 12;
    const futureY = mouseY + velY * 12;

    /* escape direction */
    let dx = cx - futureX;
    let dy = cy - futureY;

    let len = Math.hypot(dx,dy) || 1;

    dx /= len;
    dy /= len;

    const move = 140;

    let newX = rect.left + dx * move;
    let newY = rect.top + dy * move;

    /* clamp inside screen */
    newX = Math.max(0, Math.min(window.innerWidth - rect.width, newX));
    newY = Math.max(0, Math.min(window.innerHeight - rect.height, newY));

    noBtn.style.left = newX + "px";
    noBtn.style.top = newY + "px";
    noBtn.style.transform = "none";

    tease++;

    if(tease > 3) noBtn.innerText = "追不到我 😏";
    if(tease > 8) noBtn.innerText = "再快一點 😂";
    if(tease > 12) noBtn.innerText = "你其實想按願意 ❤️";

  }

},50);

}

</script>

</body>
</html>
