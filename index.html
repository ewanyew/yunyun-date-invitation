<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>給芸芸 ❤️</title>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:"Microsoft JhengHei",sans-serif;
}

body{
  height:100vh;
  overflow:hidden;
  background:linear-gradient(135deg,#ff8dc7,#ffb6d9,#ffd4e8);
  display:flex;
  justify-content:center;
  align-items:center;
}

/* PAGE */
.page{display:none;}
.page.active{display:block;}

.card{
  background:rgba(255,255,255,0.92);
  backdrop-filter:blur(12px);
  padding:40px;
  border-radius:28px;
  width:min(600px,92vw);
  text-align:center;
  box-shadow:0 20px 50px rgba(0,0,0,0.18);
}

h1{color:#ff4f9b;}

.typing{min-height:50px;font-size:18px;}

/* BUTTON */
button{
  border:none;
  cursor:pointer;
  padding:14px 26px;
  border-radius:999px;
  font-size:18px;
}

.yes{
  background:#ff4f9b;
  color:white;
  margin-top:10px;
}

.next{
  background:#ff4f9b;
  color:white;
  margin-top:10px;
}

input,select{
  width:100%;
  padding:12px;
  border-radius:12px;
  border:2px solid #ffd0e6;
  margin-top:8px;
}

/* ESCAPE BUTTON */
.no{
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  background:white;
  color:#ff4f9b;
  border:2px solid #ff4f9b;
  padding:12px 20px;
  border-radius:999px;
  z-index:999;
}

/* PHOTO */
.final-img{
  width:100%;
  border-radius:16px;
  margin-top:12px;
  box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

/* HEARTS */
.heart{
  position:fixed;
  pointer-events:none;
  animation:float 5s linear forwards;
}

@keyframes float{
  from{transform:translateY(100vh);opacity:1;}
  to{transform:translateY(-120px);opacity:0;}
}
</style>
</head>

<body>

<audio id="bgm" loop>
<source src="music.mp3">
</audio>

<!-- PAGE 1 -->
<div class="page active" id="page1">
  <div class="card">
    <h1>芸芸 ❤️</h1>
    <div class="typing" id="typing"></div>
    <button class="yes" onclick="startLove()">願意 ❤️</button>
  </div>
</div>

<!-- PAGE 2 -->
<div class="page" id="page2">
  <div class="card">
    <h1>🥰 太好了</h1>
    <button class="next" onclick="show(3)">下一步</button>
  </div>
</div>

<!-- PAGE 3 -->
<div class="page" id="page3">
  <div class="card">
    <h1>📅 約時間</h1>
    <input type="date" id="date">
    <input type="time" id="time">
    <button class="next" onclick="goFood()">下一步</button>
  </div>
</div>

<!-- PAGE 4 -->
<div class="page" id="page4">
  <div class="card">
    <h1>🍜 吃什麼</h1>
    <select id="food">
      <option value="">請選擇</option>
      <option>火鍋</option>
      <option>日料</option>
      <option>韓式烤肉</option>
      <option>西餐</option>
    </select>
    <button class="next" onclick="goActivity()">下一步</button>
  </div>
</div>

<!-- PAGE 5 -->
<div class="page" id="page5">
  <div class="card">
    <h1>🥰 行程</h1>
    <select id="activity">
      <option value="">請選擇</option>
      <option>看電影</option>
      <option>散步</option>
      <option>咖啡廳</option>
      <option>抓娃娃</option>
    </select>
    <button class="next" onclick="finish()">完成</button>
  </div>
</div>

<!-- PAGE 6 -->
<div class="page" id="page6">
  <div class="card">
    <h1>❤️ 約會成立</h1>
    <div id="summary"></div>
    <img src="photo.jpeg" class="final-img">
  </div>
</div>

<!-- ESCAPE BUTTON -->
<button class="no" id="noBtn">不願意 🙈</button>

<script>

let tease = 0;
let escaped = false;

const noBtn = document.getElementById("noBtn");

/* TYPEWRITER */
let text = "我想跟你去一個很普通，但很重要的約會 ❤️";
let i = 0;

function type(){
  if(i < text.length){
    document.getElementById("typing").innerHTML += text[i++];
    setTimeout(type,60);
  }
}
type();

/* PAGE SYSTEM */
function show(n){
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  document.getElementById("page"+n).classList.add("active");
}

/* START */
function startLove(){

  document.getElementById("bgm").play().catch(()=>{});

  for(let i=0;i<80;i++){
    setTimeout(()=>{
      let h=document.createElement("div");
      h.className="heart";
      h.innerHTML=["❤️","💖","💕"][Math.floor(Math.random()*3)];
      h.style.left=Math.random()*100+"vw";
      document.body.appendChild(h);
      setTimeout(()=>h.remove(),5000);
    },i*20);
  }

  show(2);
}

/* MOBILE */
const isTouch =
  "ontouchstart" in window ||
  navigator.maxTouchPoints > 0;

if(isTouch){
  noBtn.addEventListener("click",()=>{
    alert("你明明就願意 ❤️");
  });
}

/* DESKTOP ESCAPE (ONCE THEN FREEZE) */
else{

let mouseX=0, mouseY=0;
let lastX=0, lastY=0;
let velX=0, velY=0;

document.addEventListener("mousemove",(e)=>{
  mouseX=e.clientX;
  mouseY=e.clientY;

  velX=mouseX-lastX;
  velY=mouseY-lastY;

  lastX=mouseX;
  lastY=mouseY;
});

setInterval(()=>{

  if(escaped) return; // 🚨 FREEZE AFTER FIRST ESCAPE

  const rect=noBtn.getBoundingClientRect();

  const cx=rect.left+rect.width/2;
  const cy=rect.top+rect.height/2;

  const dist=Math.hypot(mouseX-cx,mouseY-cy);

  if(dist<180){

    const futureX=mouseX+velX*12;
    const futureY=mouseY+velY*12;

    let dx=cx-futureX;
    let dy=cy-futureY;

    let len=Math.hypot(dx,dy)||1;

    dx/=len;
    dy/=len;

    const move=180;

    let newX=rect.left+dx*move;
    let newY=rect.top+dy*move;

    newX=Math.max(0,Math.min(window.innerWidth-rect.width,newX));
    newY=Math.max(0,Math.min(window.innerHeight-rect.height,newY));

    noBtn.style.left=newX+"px";
    noBtn.style.top=newY+"px";
    noBtn.style.transform="none";

    escaped = true; // ✅ LOCK POSITION AFTER ESCAPE

    tease++;

    if(tease>2) noBtn.innerText="抓不到我 😏";
    if(tease>6) noBtn.innerText="我不動了 😂";
    if(tease>10) noBtn.innerText="快按願意 ❤️";
  }

},50);

}

/* FLOW */
function goFood(){
  if(!date.value||!time.value) return alert("先選時間");
  show(4);
}

function goActivity(){
  if(!food.value) return alert("選吃的");
  show(5);
}

function finish(){

  if(!activity.value) return alert("選活動");

  document.getElementById("summary").innerHTML=`
    <p>📅 ${date.value}</p>
    <p>⏰ ${time.value}</p>
    <p>🍜 ${food.value}</p>
    <p>🥰 ${activity.value}</p>
  `;

  show(6);

  confetti({particleCount:250,spread:150});
}

</script>

</body>
</html>
