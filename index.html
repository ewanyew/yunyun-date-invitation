<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>給芸芸 ❤️</title>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>

<style>
:root {
  --primary: #ff4f9b;
  --primary-hover: #ff2a82;
  --bg-gradient: linear-gradient(135deg, #ffeef7 0%, #ffb6d9 50%, #ffd3ea 100%);
  --card-bg: rgba(255, 255, 255, 0.88);
  --shadow: 0 20px 50px rgba(255, 79, 155, 0.15);
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Microsoft JhengHei", sans-serif;
}

body {
  height: 100vh;
  width: 100vw;
  overflow: hidden;
  background: var(--bg-gradient);
  display: flex;
  justify-content: center;
  align-items: center;
  perspective: 1000px;
}

/* CONTAINER & PAGE ANIMATIONS */
.container {
  position: relative;
  width: min(500px, 92vw);
  min-height: 420px;
  display: flex;
  justify-content: center;
  align-items: center;
}

.page {
  position: absolute;
  width: 100%;
  background: var(--card-bg);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  padding: 40px 30px;
  border-radius: 30px;
  text-align: center;
  box-shadow: var(--shadow);
  border: 1px solid rgba(255, 255, 255, 0.6);
  
  opacity: 0;
  visibility: hidden;
  transform: translateY(30px) scale(0.95) rotateX(10deg);
  transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
  pointer-events: none;
}

.page.active {
  opacity: 1;
  visibility: visible;
  transform: translateY(0) scale(1) rotateX(0deg);
  pointer-events: auto;
  z-index: 10;
}

/* TYPOGRAPHY */
h1 {
  color: var(--primary);
  font-size: 2rem;
  margin-bottom: 20px;
  font-weight: 800;
  letter-spacing: -0.5px;
}

p.desc {
  font-size: 1.1rem;
  color: #605359;
  line-height: 1.6;
  min-height: 54px;
}

/* UI ELEMENTS */
input, select {
  width: 100%;
  padding: 14px 18px;
  margin: 12px 0;
  border: 2px solid #fff0f6;
  border-radius: 16px;
  font-size: 16px;
  color: #4a3e43;
  background: rgba(255, 255, 255, 0.7);
  outline: none;
  transition: all 0.3s ease;
}

input:focus, select:focus {
  border-color: var(--primary);
  background: #fff;
  box-shadow: 0 0 0 4px rgba(255, 79, 155, 0.15);
}

/* BUTTONS CRADLE */
.btn-group {
  display: flex;
  justify-content: center;
  gap: 20px;
  margin-top: 20px;
  min-height: 50px; /* Reserves layout space */
}

button {
  border: none;
  cursor: pointer;
  padding: 14px 32px;
  border-radius: 20px;
  font-size: 16px;
  font-weight: 700;
  transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
}

.primary {
  background: var(--primary);
  color: white;
  box-shadow: 0 8px 20px rgba(255, 79, 155, 0.3);
}

.primary:hover {
  background: var(--primary-hover);
  transform: translateY(-2px);
  box-shadow: 0 12px 24px rgba(255, 79, 155, 0.4);
}

/* FLUID NO-BUTTON SETUP */
#noBtn {
  position: fixed;
  z-index: 9999;
  background: white;
  color: var(--primary);
  border: 2px solid var(--primary);
  padding: 14px 32px; /* Perfectly matches primary size */
  border-radius: 20px;
  box-shadow: 0 8px 20px rgba(0, 0, 0, 0.05);
  will-change: left, top;
}

/* FLOATING HEARTS COUTURE */
.heart {
  position: fixed;
  pointer-events: none;
  z-index: 99;
  font-size: 24px;
  will-change: transform;
  animation: floatUp 4.5s cubic-bezier(0.1, 0.8, 0.3, 1) forwards;
}

@keyframes floatUp {
  0% { transform: translateY(105vh) scale(0.3) rotate(0deg); opacity: 0; }
  15% { opacity: 0.9; }
  100% { transform: translateY(-15vh) scale(1.2) rotate(360deg); opacity: 0; }
}

/* NO CROPPING IMAGE FIX */
.final-img {
  width: 100%;
  max-height: 300px; 
  object-fit: contain; /* Prevents cropping completely */
  border-radius: 20px;
  margin-top: 15px;
  background: transparent;
}

#summary {
  background: rgba(255, 79, 155, 0.04);
  border: 1px dashed rgba(255, 79, 155, 0.25);
  border-radius: 20px;
  padding: 18px;
  text-align: left;
  margin: 15px 0;
}

#summary p {
  margin: 6px 0;
  font-size: 1rem;
  color: #504248;
}
</style>
</head>
<body>

<audio id="bgm" loop><source src="music.mp3"></audio>

<div class="container">
  <div class="page active" id="p1">
    <h1>芸芸 ❤️</h1>
    <p class="desc" id="typing"></p>
    <div class="btn-group">
      <button class="primary" id="yesBtn" onclick="start()">願意 ❤️</button>
      <div style="width: 110px;" id="noPlaceholder"></div> </div>
  </div>

  <div class="page" id="p2">
    <h1>🥰 太棒了！</h1>
    <p class="desc">我就知道妳會答應，嘻嘻。那我們開始規畫行程吧！</p>
    <button class="primary" onclick="show(3)">下一步 📅</button>
  </div>

  <div class="page" id="p3">
    <h1>📅 挑個日子吧</h1>
    <input type="date" id="date">
    <input type="time" id="time">
    <button class="primary" onclick="validateStep3()">下一步 🍜</button>
  </div>

  <div class="page" id="p4">
    <h1>🍜 想吃什麼呢？</h1>
    <select id="food">
      <option value="">請選擇專屬美食...</option>
      <option value="🍲 暖呼呼的美味火鍋">暖呼呼的火鍋</option>
      <option value="🍣 精緻美味的日式料理">精緻的日料</option>
      <option value="🥩 飽足感十足的韓式烤肉">韓式烤肉</option>
    </select>
    <button class="primary" onclick="validateStep4()">下一步 🥰</button>
  </div>

  <div class="page" id="p5">
    <h1>🥰 想去哪邊散心？</h1>
    <select id="act">
      <option value="">請選擇浪漫行程...</option>
      <option value="🎬 看一場好看的精采電影">浪漫看電影</option>
      <option value="🌳 牽著手悠閒地散散步">牽手散散步</option>
      <option value="☕ 找間很有氛圍的咖啡廳聊天">氣氛咖啡廳</option>
    </select>
    <button class="primary" onclick="finish()">完成約會計畫 ✨</button>
  </div>

  <div class="page" id="p6">
    <h1>❤️ 約會預約成功！</h1>
    <div id="summary"></div>
    <img src="photo.jpeg" class="final-img" alt="我們的相片">
  </div>
</div>

<button id="noBtn">不願意 🙈</button>

<script>
let accepted = false;

/* TYPING EFFECT */
const text = "我想跟你去一個很普通，但很重要的約會 ❤️";
let charIndex = 0;
function type() {
  if (charIndex < text.length) {
    document.getElementById("typing").innerHTML += text[charIndex++];
    setTimeout(type, 70);
  }
}
window.addEventListener('DOMContentLoaded', type);

/* NAVIGATION CONTROL */
function show(n) {
  document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
  document.getElementById("p" + n).classList.add("active");
}

function validateStep3() {
  if (!document.getElementById("date").value || !document.getElementById("time").value) return alert("請先填寫日期與時間唷 📅");
  show(4);
}

function validateStep4() {
  if (!document.getElementById("food").value) return alert("選一個妳想品嚐的美食吧 🍜");
  show(5);
}

/* START PROCESS (YES CLICKED) */
function start() {
  accepted = true;
  const noBtn = document.getElementById("noBtn");
  if(noBtn) noBtn.remove();

  document.getElementById("bgm").play().catch(() => {});

  for (let i = 0; i < 45; i++) {
    setTimeout(() => {
      let h = document.createElement("div");
      h.className = "heart";
      h.innerHTML = ["❤️", "💖", "💝", "💕"][Math.floor(Math.random() * 4)];
      h.style.left = Math.random() * 100 + "vw";
      h.style.fontSize = (Math.random() * 16 + 16) + "px";
      document.body.appendChild(h);
      setTimeout(() => h.remove(), 4500);
    }, i * 40);
  }

  confetti({ particleCount: 160, spread: 80, origin: { y: 0.6 } });
  show(2);
}

/* FINISH APPLICATION */
function finish() {
  if (!document.getElementById("act").value) return alert("挑選一個活動吧 🥰");

  document.getElementById("summary").innerHTML = `
    <p><strong>📅 日期：</strong> ${document.getElementById("date").value}</p>
    <p><strong>⏰ 時間：</strong> ${document.getElementById("time").value}</p>
    <p><strong>🍜 餐廳：</strong> ${document.getElementById("food").value}</p>
    <p><strong>✨ 活動：</strong> ${document.getElementById("act").value}</p>
  `;

  show(6);

  let end = Date.now() + (3 * 1000);
  (function frame() {
    confetti({ particleCount: 3, angle: 60, spread: 55, origin: { x: 0 } });
    confetti({ particleCount: 3, angle: 120, spread: 55, origin: { x: 1 } });
    if (Date.now() < end) requestAnimationFrame(frame);
  }());
}

/* ========================================================
   🧠 ADVANCED MAGNET-RETURN PHYSICS ENGINE
======================================================== */
const btn = document.getElementById("noBtn");
const yesBtn = document.getElementById("yesBtn");

let btnX = 0, btnY = 0;         // Live Positions
let velX = 0, velY = 0;         // Velocity vectors
let mouseX = 0, mouseY = 0;     // Mouse tracking
let isInitialized = false;

document.addEventListener("mousemove", (e) => {
  mouseX = e.clientX;
  mouseY = e.clientY;
});

// Detect Home layout coordinates accurately (To the right of '願意')
let homeX = 0, homeY = 0;

function updateHomePosition() {
  const yesRect = yesBtn.getBoundingClientRect();
  homeX = yesRect.right + 20; // 20px margin right of the "Yes" button
  homeY = yesRect.top;
}

// Main High-Performance Physics Pipeline
function updatePhysics() {
  if (accepted) return;

  // Always keep home dynamic to counter browser resizes/card scales
  updateHomePosition();

  if (!isInitialized) {
    if(yesBtn.getBoundingClientRect().width > 0) {
      btnX = homeX;
      btnY = homeY;
      isInitialized = true;
    }
    requestAnimationFrame(updatePhysics);
    return;
  }

  const rect = btn.getBoundingClientRect();
  const centerX = rect.left + rect.width / 2;
  const centerY = rect.top + rect.height / 2;

  let diffX = centerX - mouseX;
  let diffY = centerY - mouseY;
  let dist = Math.sqrt(diffX * diffX + diffY * diffY);

  const dangerRadius = 140; // Detection zone

  if (dist < dangerRadius && dist > 0) {
    // RUN AWAY INTERACTION
    let force = (dangerRadius - dist) / dangerRadius; 
    let pushAcceleration = force * 15; 

    velX += (diffX / dist) * pushAcceleration;
    velY += (diffY / dist) * pushAcceleration;
  } else {
    // MAGNET HOME TREATMENT (Drift home naturally when left alone)
    let homeDiffX = homeX - btnX;
    let homeDiffY = homeY - btnY;
    
    // Spring constant pull
    velX += homeDiffX * 0.08;
    velY += homeDiffY * 0.08;

    // Air Resistance friction 
    velX *= 0.78;
    velY *= 0.78;
  }

  // Update internal metrics
  btnX += velX;
  btnY += velY;

  // Render variables perfectly
  btn.style.left = btnX + "px";
  btn.style.top = btnY + "px";

  // Hide the button instantly if she bypasses page 1
  const p1 = document.getElementById("p1");
  if (!p1.classList.contains("active")) {
    btn.style.display = "none";
  } else {
    btn.style.display = "block";
  }

  requestAnimationFrame(updatePhysics);
}

// Start loop
requestAnimationFrame(updatePhysics);

window.addEventListener("resize", () => { updateHomePosition(); });

btn.addEventListener("click", () => {
  alert("逃不掉的～就知道妳最愛我了 🥰");
  start();
});
</script>

</body>
</html>
